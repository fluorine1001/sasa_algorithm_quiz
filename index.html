<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>맞춤형 알고리즘 문제 추천기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-10">
            <h1 class="text-3xl font-bold text-blue-600 mb-2">맞춤형 문제 추천 시스템</h1>
            <p class="text-gray-500">분반과 목표 평균 난이도를 선택하고 6개의 문제를 뽑아보세요!</p>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8 flex flex-col sm:flex-row gap-4 items-center justify-between">
            <div class="flex gap-4 w-full sm:w-auto">
                <div class="flex flex-col">
                    <label for="sectionFilter" class="text-sm font-semibold mb-1">분반 선택</label>
                    <select id="sectionFilter" class="border border-gray-300 rounded p-2 focus:outline-none focus:border-blue-500">
                        <option value="all">전체 포함</option>
                        <option value="1">1분반</option>
                        <option value="2">2분반</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label for="difficultyFilter" class="text-sm font-semibold mb-1">목표 평균 난이도</label>
                    <select id="difficultyFilter" class="border border-gray-300 rounded p-2 focus:outline-none focus:border-blue-500">
                        <option value="all">상관없음 (완전 랜덤)</option>
                        <option value="1.5">평균 1.5 (하~중 위주)</option>
                        <option value="2.0">평균 2.0 (골고루 섞임)</option>
                        <option value="2.5">평균 2.5 (중~상 위주)</option>
                    </select>
                </div>
            </div>
            
            <button id="drawBtn" class="w-full sm:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow transition duration-200">
                문제 뽑기
            </button>
        </div>

        <div id="resultContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
        
        <div id="messageArea" class="text-center text-gray-500 mt-8 font-medium">
            조건을 선택하고 [문제 뽑기] 버튼을 눌러주세요.
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
