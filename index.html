<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알고리즘 문제 셋 생성기</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen p-6">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-blue-600">알고리즘 문제 셋 생성기</h1>
        </header>

        <div class="bg-white p-6 rounded-lg shadow-md mb-8 flex flex-col md:flex-row gap-4 items-end justify-between">
            <div class="flex flex-wrap gap-4 w-full md:w-auto">
                <div class="flex flex-col">
                    <label for="sectionFilter" class="text-sm font-semibold mb-1">분반 선택</label>
                    <select id="sectionFilter" class="border border-gray-300 rounded p-2 focus:outline-none focus:border-blue-500">
                        <option value="all">전체</option>
                        <option value="1">1분반</option>
                        <option value="2">2분반</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label for="difficultyFilter" class="text-sm font-semibold mb-1">문제 셋 난이도</label>
                    <select id="difficultyFilter" class="border border-gray-300 rounded p-2 focus:outline-none focus:border-blue-500">
                        <option value="all">랜덤</option>
                        <option value="low">하</option>
                        <option value="mid">중</option>
                        <option value="high">상</option>
                    </select>
                </div>
                <div class="flex flex-col">
                    <label for="countFilter" class="text-sm font-semibold mb-1">문제 셋 크기</label>
                    <input type="number" id="countFilter" min="1" max="20" value="6" class="border border-gray-300 rounded p-2 focus:outline-none focus:border-blue-500 w-24">
                </div>
            </div>
            
            <button id="drawBtn" class="w-full md:w-auto bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow transition duration-200 mt-4 md:mt-0">
                문제 셋 생성
            </button>
        </div>

        <div id="resultContainer" class="flex flex-col gap-3">
            </div>
        
        <div id="messageArea" class="text-center text-gray-500 mt-8 font-medium">
            조건을 선택하고 [문제 셋 생성] 버튼을 눌러주세요.
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
